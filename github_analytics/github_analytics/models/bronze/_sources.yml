version: 2

sources:
  - name: bronze
    description: "Raw GitHub data"
    schema: bronze
    tables:
      - name: raw_repositories
        description: "Repository metadata"
        columns:
          - name: full_name
            description: "Unique identifier owner/repo"
            tests:
              - unique
              - not_null

      - name: raw_commits
        description: "Commit history"
        columns:
          - name: sha
            tests:
              - not_null

      - name: raw_pull_requests
        description: "Pull requests (all states)"
        columns:
          - name : pr_number
            tests :
              - not_null

      - name: raw_issues
        description: "Issues (all states)"
        columns:
          - name: issue_number
            tests :
              - not_null
